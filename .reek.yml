---
exclude_paths:
  - bin
  - spec

detectors:
  IrresponsibleModule:
    enabled: false
  UtilityFunction:
    exclude:
      - "Lexdrill::CLI#run_start"
      - "Lexdrill::CLI#run_stop"
      - "Lexdrill::CLI#clear_beat"
      - "Lexdrill::CLI#colored_line"
      - "Lexdrill::CLI#set_rand_beat"
      - "Lexdrill::CLI#jump_to"
      - "Lexdrill::CLI#export_rows"
      - "Lexdrill::CLI#sheets_target"
      - "Lexdrill::CLI#newer?"
      - "Lexdrill::CLI#spreadsheet_id_for"
  ControlParameter:
    exclude:
      - "Lexdrill::CLI#spreadsheet_id_for"
  TooManyMethods:
    exclude:
      - "Lexdrill::CLI"
  RepeatedConditional:
    exclude:
      - "Lexdrill::CLI"
  TooManyStatements:
    exclude:
      - "Lexdrill::Beat#self.locate"
      - "Lexdrill::CLI#run_add"
      - "Lexdrill::CLI#run_list"
      - "Lexdrill::CLI#run_stats"
      - "Lexdrill::CLI#run_go"
      - "Lexdrill::CLI#run_oauth"
      - "Lexdrill::CLI#run_remote"
      - "Lexdrill::CLI#run_export"
      - "Lexdrill::CLI#run_import"
      - "Lexdrill::CLI#perform_import"
      - "Lexdrill::CLI#print_sheets_api_error"
      - "Lexdrill::Colorizer#self.gradient_code"
      - "Lexdrill::Inspector#self.words_summary"
      - "Lexdrill::WordList#self.next"
      - "Lexdrill::GoogleAuth#self.poll_for_token"
      - "Lexdrill::GoogleAuth#self.handle_refresh_response"
      - "Lexdrill::HTTPClient#self.build_json_request"
  TooManyConstants:
    exclude:
      - "Lexdrill::Config"
      - "Lexdrill::Beat"
      - "Lexdrill::GoogleAuth"
  DuplicateMethodCall:
    exclude:
      - "Lexdrill::CLI#run_export"
      - "Lexdrill::CLI#run_import"
  FeatureEnvy:
    exclude:
      - "Lexdrill::CLI#perform_import"
  LongParameterList:
    exclude:
      - "Lexdrill::HTTPClient#self.json_request"
      - "Lexdrill::HTTPClient#self.build_json_request"
      - "Lexdrill::SheetsClient#self.overwrite_sheet"
      - "Lexdrill::SheetsClient#self.update"
