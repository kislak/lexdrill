---
exclude_paths:
  - bin
  - spec

detectors:
  IrresponsibleModule:
    enabled: false
  UtilityFunction:
    exclude:
      - "Lexdrill::CLI#run_start"
      - "Lexdrill::CLI#run_stop"
      - "Lexdrill::CLI#clear_beat"
  TooManyMethods:
    exclude:
      - "Lexdrill::CLI"
  TooManyStatements:
    exclude:
      - "Lexdrill::Beat#self.locate"
